<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Control Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0f14;
      --surface: #131820;
      --border: rgba(255, 255, 255, 0.1);
      --text: #e8eaed;
      --muted: #8b95a5;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --danger-bg: rgba(248, 113, 113, 0.12);
      --danger-border: rgba(248, 113, 113, 0.35);
      --danger-text: #f87171;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 45% at 50% -15%, rgba(99, 102, 241, 0.22), transparent),
        radial-gradient(ellipse 50% 35% at 100% 100%, rgba(52, 211, 153, 0.05), transparent);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px 40px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.45);
    }

    .card::before {
      content: '';
      display: block;
      width: 48px;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), #a5b4fc);
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 28px;
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field {
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 0.9375rem;
      color: var(--text);
      background: #0c0f14;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input::placeholder {
      color: #5c6570;
    }

    input:focus {
      border-color: rgba(99, 102, 241, 0.55);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 8px;
      padding: 14px 18px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease, box-shadow 0.12s ease;
    }

    button[type="submit"]:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    .alert {
      display: none;
      margin-bottom: 20px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.8125rem;
      line-height: 1.45;
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      color: var(--danger-text);
    }

    .alert.show {
      display: block;
    }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      user-select: none;
    }

    .remember-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .remember-row label {
      margin: 0;
      font-size: 0.875rem;
      font-weight: 500;
      text-transform: none;
      letter-spacing: normal;
      color: var(--text);
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Control panel</h1>
    <p class="subtitle">Sign in with your credentials to open the dashboard.</p>

    <div class="alert" id="err" role="alert">Invalid username or password. Try again.</div>

    <form method="post" action="/dash/login" autocomplete="on">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <div class="remember-row">
        <input type="checkbox" name="remember" value="1" id="remember" />
        <label for="remember">Remember me — stay signed in on this device</label>
      </div>
      <button type="submit">Sign in</button>
    </form>

    <p class="footer-note">Without “Remember me”, the session ends after 24 hours. With it, the cookie lasts years unless you log out or clear site data.</p>
  </div>

  <script>
    if (new URLSearchParams(location.search).get('error') === '1') {
      document.getElementById('err').classList.add('show');
    }
  </script>
</body>

</html>
